# Configuracion de deteccion de somnolencia (EAR + PERCLOS).
# Todos los valores provienen de literatura publica bien establecida sobre
# fatiga y microsuenos al conducir; ver el comentario sobre cada clave.
# Los indices de landmarks de ojos usados para el calculo de EAR (fijos, no
# configurables) estan documentados como constantes en dsd/face_mesh.py.

# Eye Aspect Ratio (EAR): razon geometrica calculada sobre 6 puntos del
# contorno de cada ojo (ver dsd/eye_metrics.py). Con el ojo abierto, EAR
# tipicamente esta en el rango ~0.25-0.35; al cerrarse, cae abruptamente
# hacia ~0.0-0.15. El umbral de referencia viene de Soukupova & Cech,
# "Real-Time Eye Blink Detection using Facial Landmarks" (2016), que usa
# un valor cercano a 0.2 para separar ojo abierto de ojo cerrado.
ear_umbral: 0.21

# Duracion minima continua (segundos) con EAR por debajo de `ear_umbral`
# para considerar que ocurrio un "microsueno". La literatura de fatiga al
# conducir (p.ej. Wierwille et al. 1994, investigacion patrocinada por
# NHTSA sobre monitoreo del estado del conductor) reporta que cierres de
# parpados de aproximadamente 1 a 2 segundos ya son indicativos de
# microsuenos con perdida de atencion vial. Se eligio 1.5s como punto medio
# conservador de ese rango.
microsueno_segundos: 1.5

# Tamano (segundos) de la ventana deslizante usada para calcular PERCLOS
# (PERcentage of eyelid CLOSure), la metrica de fatiga acumulada definida
# por Wierwille et al. 1994 (NHTSA). PERCLOS clasico se mide en ventanas de
# 1 a 3 minutos; se eligio 60s (el extremo mas reactivo de ese rango) para
# detectar fatiga sin esperar demasiado tiempo.
perclos_ventana_segundos: 60

# Fraccion de tiempo (0.0-1.0) dentro de la ventana anterior con los ojos
# cerrados para considerar "fatiga acumulada". La literatura de PERCLOS
# (Wierwille et al. 1994 y estudios posteriores de somnolencia al
# conducir) reporta que valores de PERCLOS por encima de aproximadamente
# 0.15 (15%) ya se asocian con niveles de somnolencia significativos.
perclos_umbral: 0.15

# Tiempo minimo (segundos) entre dos disparos consecutivos del mismo tipo
# de evento (microsueno o perclos), para evitar eventos repetidos mientras
# la condicion persiste. No proviene de un estudio especifico -- es un
# parametro de diseno para no saturar el registro de eventos; 30s permite
# que una condicion sostenida se vuelva a reportar periodicamente.
cooldown_segundos: 30

# Fraccion minima (0.0-1.0) de la ventana de PERCLOS que debe estar
# efectivamente cubierta por muestras reales para evaluar PERCLOS, ademas
# de haber transcurrido el tiempo nominal de la ventana. Sin este chequeo,
# si el rostro no se detecta durante un tramo largo (p.ej. cabeza girada,
# lentes con reflejo) y luego vuelven a llegar solo un par de muestras muy
# cercanas entre si, el calculo de PERCLOS se haria sobre esos pocos
# instantes y podria disparar fatiga acumulada de forma espuria. No
# proviene de un estudio especifico -- es una salvaguarda de ingenieria
# agregada tras una revision de codigo (ver docs/superpowers/plans, tarea
# de correccion post-revision del detector de somnolencia). 0.5 exige que
# al menos la mitad de la ventana este respaldada por datos reales,
# tolerando huecos cortos (p.ej. unos pocos segundos sin deteccion) sin
# bloquear evaluaciones legitimas.
perclos_cobertura_minima: 0.5

# Tiempo maximo (segundos) permitido entre dos frames procesados
# consecutivamente antes de considerar que hubo un "hueco" de deteccion
# (p.ej. el rostro no se detecto durante un tramo, por oclusion, angulo
# extremo o iluminacion). Cuando hay un hueco, el temporizador de
# microsueno se reinicia en vez de asumir que los ojos estuvieron cerrados
# de forma continua durante todo el hueco -- sin este chequeo, un cierre
# de ojos detectado justo despues de un hueco prolongado podria disparar
# un microsueno inmediato con una duracion inflada (el mismo tipo de
# problema que motivo perclos_cobertura_minima, aplicado aqui al
# temporizador de sostenimiento en vez de a la ventana deslizante).
# Salvaguarda de ingenieria agregada tras una revision de codigo (ver
# docs/superpowers/plans, correccion post-revision del detector de
# distraccion). 1.0s es holgado frente a la cadencia real de una camara
# (decenas de frames por segundo mientras el rostro se detecta
# continuamente), por lo que no afecta el funcionamiento normal.
gap_maximo_segundos: 1.0

# Mouth Aspect Ratio (MAR): razon geometrica identica al EAR (ver
# dsd/mouth_metrics.py) pero aplicada a los 6 puntos de boca. Boca cerrada
# -> MAR bajo (~0.3-0.5 tipico); boca abierta en bostezo -> MAR alto
# (>1.0 tipico). Decision de ingenieria -- se calibrara con verificacion
# manual real, igual que gaze_ratio_umbral en el detector de distraccion.
mar_umbral: 0.6

# Duracion minima continua (segundos) con la boca abierta para contar como
# un bostezo (y no, p.ej., hablar o gesticular). Decision de ingenieria,
# sujeta a calibracion con pruebas reales.
bostezo_min_segundos: 1.5

# Tamano (segundos) de la ventana deslizante para contar frecuencia de
# bostezos. Decision de ingenieria, sujeta a calibracion con pruebas
# reales -- analoga a perclos_ventana_segundos pero para conteo de eventos
# discretos en vez de tiempo ponderado.
bostezo_ventana_segundos: 300

# Cantidad minima de bostezos dentro de la ventana anterior para
# considerar "fatiga por bostezos". Decision de ingenieria, sujeta a
# calibracion con pruebas reales.
bostezo_umbral_cantidad: 3
